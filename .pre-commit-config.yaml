repos:
  # Block binary docs/images from being committed
  - repo: local
    hooks:
      - id: block-media-files
        name: block media/document files
        entry: python scripts/block_media_files.py
        language: system
        files: \.(pdf|jpg|jpeg|png)$

  # Pre-commit maintained hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending

  # Detect secrets
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

ci:
  autoupdate_schedule: monthly
